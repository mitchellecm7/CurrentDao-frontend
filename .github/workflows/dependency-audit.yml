name: Dependency Security Audit

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  security-audit:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run npm audit
      id: audit
      run: |
        echo "Running npm audit..."
        npm audit --json > audit-report.json || true
        
        # Parse audit results
        if [ -f audit-report.json ]; then
          CRITICAL=$(jq -r '.metadata.vulnerabilities.critical // 0' audit-report.json)
          HIGH=$(jq -r '.metadata.vulnerabilities.high // 0' audit-report.json)
          MEDIUM=$(jq -r '.metadata.vulnerabilities.medium // 0' audit-report.json)
          LOW=$(jq -r '.metadata.vulnerabilities.low // 0' audit-report.json)
          
          echo "critical-vulnerabilities=$CRITICAL" >> $GITHUB_OUTPUT
          echo "high-vulnerabilities=$HIGH" >> $GITHUB_OUTPUT
          echo "medium-vulnerabilities=$MEDIUM" >> $GITHUB_OUTPUT
          echo "low-vulnerabilities=$LOW" >> $GITHUB_OUTPUT
          
          echo "## 📊 Security Audit Results" >> $GITHUB_STEP_SUMMARY
          echo "| Severity | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Critical | $CRITICAL |" >> $GITHUB_STEP_SUMMARY
          echo "| High | $HIGH |" >> $GITHUB_STEP_SUMMARY
          echo "| Medium | $MEDIUM |" >> $GITHUB_STEP_SUMMARY
          echo "| Low | $LOW |" >> $GITHUB_STEP_SUMMARY
          
          # Display vulnerable packages if any
          TOTAL_VULNS=$((CRITICAL + HIGH + MEDIUM + LOW))
          if [ $TOTAL_VULNS -gt 0 ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### 🚨 Vulnerable Packages" >> $GITHUB_STEP_SUMMARY
            jq -r '.vulnerabilities | to_entries[] | "- **\(.key)** (\(.value.severity | ascii_upcase)): \(.value.title | gsub("\\n"; " "))"' audit-report.json >> $GITHUB_STEP_SUMMARY
          fi
        else
          echo "No vulnerabilities found ✅" >> $GITHUB_STEP_SUMMARY
          echo "critical-vulnerabilities=0" >> $GITHUB_OUTPUT
          echo "high-vulnerabilities=0" >> $GITHUB_OUTPUT
          echo "medium-vulnerabilities=0" >> $GITHUB_OUTPUT
          echo "low-vulnerabilities=0" >> $GITHUB_OUTPUT
        fi
        
        # Display audit report
        echo "## 📋 Full Audit Report" >> $GITHUB_STEP_SUMMARY
        echo '```json' >> $GITHUB_STEP_SUMMARY
        cat audit-report.json >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
      
    - name: Check for critical vulnerabilities
      run: |
        CRITICAL_COUNT="${{ steps.audit.outputs.critical-vulnerabilities }}"
        HIGH_COUNT="${{ steps.audit.outputs.high-vulnerabilities }}"
        
        if [ "$CRITICAL_COUNT" -gt 0 ]; then
          echo "❌ Found $CRITICAL_COUNT critical vulnerabilities!"
          echo "Please address these critical security issues immediately."
          exit 1
        fi
        
        if [ "$HIGH_COUNT" -gt 0 ]; then
          echo "⚠️ Found $HIGH_COUNT high severity vulnerabilities"
          echo "Consider addressing these high severity issues soon."
        fi
        
        echo "✅ No critical vulnerabilities found"
      
    - name: Upload audit report as artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: security-audit-report
        path: audit-report.json
        retention-days: 30
        
    - name: Comment on PR with security findings
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          
          if (fs.existsSync('audit-report.json')) {
            const auditData = JSON.parse(fs.readFileSync('audit-report.json', 'utf8'));
            const critical = auditData.metadata?.vulnerabilities?.critical || 0;
            const high = auditData.metadata?.vulnerabilities?.high || 0;
            const medium = auditData.metadata?.vulnerabilities?.medium || 0;
            const low = auditData.metadata?.vulnerabilities?.low || 0;
            const total = critical + high + medium + low;
            
            let comment = '## 🔒 Dependency Security Audit\n\n';
            comment += '| Severity | Count |\n';
            comment += '|----------|-------|\n';
            comment += `| Critical | ${critical} |\n`;
            comment += `| High | ${high} |\n`;
            comment += `| Medium | ${medium} |\n`;
            comment += `| Low | ${low} |\n\n`;
            
            if (total > 0) {
              comment += '### 🚨 Security Issues Found\n\n';
              
              if (critical > 0) {
                comment += `❌ **${critical} critical** vulnerabilities found. These must be fixed before merge.\n\n`;
              }
              
              if (high > 0) {
                comment += `⚠️ **${high} high** severity vulnerabilities found. Consider fixing before merge.\n\n`;
              }
              
              if (auditData.vulnerabilities) {
                comment += '### Vulnerable Packages:\n\n';
                Object.entries(auditData.vulnerabilities).forEach(([pkg, vuln]) => {
                  const severity = vuln.severity?.toUpperCase() || 'UNKNOWN';
                  const title = vuln.title || 'Unknown vulnerability';
                  comment += `- **${pkg}** (${severity}): ${title}\n`;
                });
              }
            } else {
              comment += '✅ **No security vulnerabilities found!**\n\n';
            }
            
            comment += '\n---\n';
            comment += '*This comment was automatically generated by the dependency security audit workflow.*';
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
          }

  outdated-dependencies:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Check for outdated dependencies
      id: outdated
      run: |
        echo "Checking for outdated dependencies..."
        npm outdated --json > outdated-report.json || true
        
        if [ -f outdated-report.json ] && [ -s outdated-report.json ]; then
          OUTDATED_COUNT=$(jq 'length' outdated-report.json)
          echo "outdated-count=$OUTDATED_COUNT" >> $GITHUB_OUTPUT
          
          echo "## 📦 Outdated Dependencies" >> $GITHUB_STEP_SUMMARY
          echo "| Package | Current | Latest | Type |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|---------|--------|------|" >> $GITHUB_STEP_SUMMARY
          
          jq -r 'to_entries[] | "| \(.key) | \(.value.current) | \(.value.latest) | \(.value.type) |"' outdated-report.json >> $GITHUB_STEP_SUMMARY
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**$OUTDATED_COUNT packages** are out of date." >> $GITHUB_STEP_SUMMARY
        else
          echo "outdated-count=0" >> $GITHUB_OUTPUT
          echo "✅ All dependencies are up to date" >> $GITHUB_STEP_SUMMARY
        fi
      
    - name: Upload outdated report as artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: outdated-dependencies-report
        path: outdated-report.json
        retention-days: 30
