<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CurrentDao API Playground</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Fira+Code:wght@400;500&display=swap');
    body { font-family: 'Inter', sans-serif; }
    pre, code { font-family: 'Fira Code', monospace; }
  </style>
</head>
<body class="bg-[#0f172a] text-slate-200 min-h-screen">
  <nav class="border-b border-slate-800 bg-slate-900/50 backdrop-blur-md sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
      <div class="flex items-center gap-2">
        <div class="h-8 w-8 bg-blue-600 rounded-lg flex items-center justify-center font-bold text-white">C</div>
        <span class="font-bold text-xl tracking-tight text-white">CurrentDao <span class="text-blue-500">Playground</span></span>
      </div>
      <div class="flex gap-4">
        <button class="text-sm font-medium text-slate-400 hover:text-white transition-colors">Documentation</button>
        <button class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-lg text-sm font-bold transition-all shadow-lg shadow-blue-900/20">Sign In</button>
      </div>
    </div>
  </nav>

  <main class="max-w-7xl mx-auto px-4 py-8 grid grid-cols-1 lg:grid-cols-2 gap-8">
    <!-- Left Column: Request Form -->
    <div class="space-y-6">
      <section class="bg-slate-900 border border-slate-800 rounded-2xl overflow-hidden">
        <div class="p-4 border-b border-slate-800 bg-slate-800/30">
          <h2 class="font-bold text-white">Request</h2>
        </div>
        <div class="p-6 space-y-4">
          <div>
            <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Endpoint</label>
            <div class="flex gap-2">
              <select class="bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
                <option>POST</option>
                <option>GET</option>
                <option>PUT</option>
                <option>DELETE</option>
              </select>
              <input type="text" value="/trading/execute" class="flex-1 bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-sm text-white focus:outline-none focus:ring-2 focus:ring-blue-500" />
            </div>
          </div>
          <div>
            <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Headers</label>
            <div class="space-y-2">
              <div class="flex gap-2">
                <input type="text" value="Authorization" class="w-1/3 bg-slate-800/50 border border-slate-700 rounded-lg px-3 py-2 text-xs text-slate-400" disabled />
                <input type="text" value="Bearer YOUR_TOKEN" class="flex-1 bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-xs text-white" />
              </div>
            </div>
          </div>
          <div>
            <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Body</label>
            <textarea class="w-full bg-[#020617] border border-slate-700 rounded-xl p-4 text-sm text-blue-400 font-mono h-48 focus:outline-none focus:ring-2 focus:ring-blue-500">
{
  "symbol": "XLM/USDC",
  "side": "buy",
  "amount": 100
}</textarea>
          </div>
          <button class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-xl transition-all shadow-xl shadow-blue-900/30">
            Execute Request
          </button>
        </div>
      </section>
    </div>

    <!-- Right Column: Response -->
    <div class="space-y-6">
      <section class="bg-slate-900 border border-slate-800 rounded-2xl overflow-hidden h-full flex flex-col">
        <div class="p-4 border-b border-slate-800 bg-slate-800/30 flex justify-between items-center">
          <h2 class="font-bold text-white">Response</h2>
          <span class="px-2 py-0.5 bg-emerald-500/10 text-emerald-500 text-[10px] font-black rounded border border-emerald-500/20">200 OK</span>
        </div>
        <div class="p-6 flex-1 bg-[#020617]">
          <pre class="text-sm text-emerald-400">
{
  "status": "success",
  "data": {
    "transactionId": "tx_98723451",
    "timestamp": "2026-04-24T22:57:19Z",
    "details": {
      "symbol": "XLM/USDC",
      "amount": 100,
      "price": 0.1245
    }
  }
}</pre>
        </div>
      </section>
    </div>
  </main>
</body>
</html>
